<!-- ── SECTION: Isu & Kasus ─────────────────────────────── -->
<div id="section-issues" class="section-content" style="display:none">

  <!-- Stat Cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px">
    <div class="stat-card">
      <div class="stat-value" id="issueTotalCount">-</div>
      <div class="stat-label">Total Isu</div>
    </div>
    <div class="stat-card" style="border-color:#fde68a">
      <div class="stat-value" style="color:#d97706" id="issuePendingCount">-</div>
      <div class="stat-label">Menunggu Review</div>
    </div>
    <div class="stat-card" style="border-color:#bfdbfe">
      <div class="stat-value" style="color:#2563eb" id="issueActiveCount">-</div>
      <div class="stat-label">Aktif</div>
    </div>
    <div class="stat-card" style="border-color:#fecaca">
      <div class="stat-value" style="color:#ef4444" id="issueCriticalCount">-</div>
      <div class="stat-label">Kritis (Open)</div>
    </div>
    <div class="stat-card" style="border-color:#fecaca">
      <div class="stat-value" style="color:#ef4444" id="issueStaleCount">-</div>
      <div class="stat-label">Kritis &gt;14 Hari</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
    <input type="text" id="issueSearchInput"
      placeholder="&#128269; Cari isu, lokasi, provinsi..."
      oninput="filterIssues()"
      style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;min-width:220px;flex:1">
    <select id="issueFilterCategory" onchange="filterIssues()"
      style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px">
      <option value="">Semua Kategori</option>
      <option>IUU Fishing</option>
      <option>HAM Pekerja</option>
      <option>Lingkungan</option>
      <option>Perdagangan Manusia</option>
      <option>Perburuhan</option>
      <option>Kebijakan Kelautan</option>
      <option>Ketenagakerjaan</option>
      <option>Lainnya</option>
    </select>
    <select id="issueFilterSeverity" onchange="filterIssues()"
      style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px">
      <option value="">Semua Severity</option>
      <option value="critical">Kritis</option>
      <option value="high">Tinggi</option>
      <option value="medium">Sedang</option>
      <option value="low">Rendah</option>
    </select>
    <select id="issueFilterStatus" onchange="filterIssues()"
      style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px">
      <option value="">Semua Status</option>
      <option value="pending_review">Menunggu Review</option>
      <option value="active">Aktif</option>
      <option value="under_investigation">Investigasi</option>
      <option value="resolved">Terselesaikan</option>
      <option value="closed">Ditutup</option>
      <option value="rejected">Ditolak</option>
    </select>
    <input type="text" id="issueFilterTag"
      placeholder="Filter tag..."
      oninput="filterIssues()"
      style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;width:130px">
    <button class="btn-primary" onclick="openAddIssueModal()">
      <i class="fa-solid fa-plus"></i> Tambah Isu
    </button>
  </div>

  <!-- Error message -->
  <div id="issueLoadError"
    style="display:none;background:#fef2f2;color:#ef4444;border:1px solid #fecaca;
    border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px"></div>

  <!-- Count label -->
  <div id="issueCountLabel" style="font-size:12px;color:#94a3b8;margin-bottom:8px"></div>

  <!-- Tabel -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Isu / Lokasi</th>
          <th>Kategori</th>
          <th>Severity</th>
          <th>Status</th>
          <th>Tgl Kejadian</th>
          <th>Update</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="issueTableBody">
        <tr>
          <td colspan="8" style="text-align:center;padding:28px;color:#94a3b8">
            Memuat data&hellip;
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div id="issuePagination"></div>

</div>
<!-- ── END SECTION: Isu & Kasus ──────────────────────────── -->


<!-- ═══════════════════════════════════════════════════════════
     MODAL: Detail Isu + Timeline
     ═══════════════════════════════════════════════════════════ -->
<div id="issueDetailOverlay" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:680px">
    <div class="modal-header">
      <span>Detail Isu &amp; Timeline</span>
      <button class="modal-close" onclick="closeIssueDetail()">&times;</button>
    </div>
    <div class="modal-body" id="issueDetailBody"
      style="max-height:75vh;overflow-y:auto;padding:20px">
      <!-- Diisi otomatis oleh issues.js openIssueDetail() -->
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════
     MODAL: Tambah / Edit Isu
     ═══════════════════════════════════════════════════════════ -->
<div id="issueFormOverlay" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:560px">
    <div class="modal-header">
      <span id="issueFormTitle">Tambah Isu Baru</span>
      <button class="modal-close" onclick="closeIssueModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="issueFormId">

      <div class="form-group">
        <label>Judul Isu <span class="required">*</span></label>
        <input type="text" id="issueF-title"
          placeholder="Contoh: Kapal Vietnam Fishing Ilegal di Arafura">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Kategori</label>
          <select id="issueF-category">
            <option>IUU Fishing</option>
            <option>HAM Pekerja</option>
            <option>Lingkungan</option>
            <option>Perdagangan Manusia</option>
            <option>Perburuhan</option>
            <option>Kebijakan Kelautan</option>
            <option>Ketenagakerjaan</option>
            <option selected>Lainnya</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tingkat Keparahan</label>
          <select id="issueF-severity">
            <option value="critical">&#128308; Kritis</option>
            <option value="high">&#128992; Tinggi</option>
            <option value="medium" selected>&#128993; Sedang</option>
            <option value="low">&#128994; Rendah</option>
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Provinsi</label>
          <input type="text" id="issueF-province" placeholder="cth: Maluku">
        </div>
        <div class="form-group">
          <label>Lokasi Detail</label>
          <input type="text" id="issueF-location" placeholder="cth: Kepulauan Aru">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Tanggal Kejadian</label>
          <input type="date" id="issueF-date-occurred">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="issueF-status">
            <option value="pending_review">Menunggu Review</option>
            <option value="active" selected>Aktif</option>
            <option value="under_investigation">Sedang Investigasi</option>
            <option value="resolved">Terselesaikan</option>
            <option value="closed">Ditutup</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Deskripsi Lengkap</label>
        <textarea id="issueF-description" rows="3"
          placeholder="Detail kejadian, konteks, dampak, jumlah korban..."></textarea>
      </div>

      <div class="form-group">
        <label>Link Sumber / Referensi</label>
        <input type="url" id="issueF-source-link"
          placeholder="https://berita.com/artikel...">
      </div>

      <div class="form-group">
        <label>Tags <span style="font-weight:400;color:#94a3b8">(pisahkan dengan koma)</span></label>
        <input type="text" id="issueF-tags"
          placeholder="ABK Migran, Arafura, Vietnam, Kapal Asing">
      </div>

      <div id="issueFormMsg" class="form-msg hidden"></div>

      <div class="form-actions">
        <button class="btn-secondary" onclick="closeIssueModal()">Batal</button>
        <button class="btn-primary" onclick="saveIssue()">
          <i class="fa-solid fa-floppy-disk"></i> Simpan
        </button>
      </div>
    </div>
  </div>
</div>
